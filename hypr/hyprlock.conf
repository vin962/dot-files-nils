background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 10
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = $TIME
    color = $tertiary
    font_size = 100
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $tertiary
    font_size = 30
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = $outline
    inner_color = $surface
    font_color = $on_surface
    check_color = $primary
    fail_color = $error
    fade_on_empty = true
    placeholder_text = Enter Password...
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}
